[workspace]
resolver = "2"
members = [
    "agent-bridle-core",
    "agent-bridle-tool-shell",
    "agent-bridle",
    "agent-bridle-mcp",
    "agent-bridle-py",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/Gilamonster-Foundation/agent-bridle"
authors = ["Shawn Hartsock <hartsock@users.noreply.github.com>"]

[workspace.dependencies]
# In-workspace crates (lock-step version).
agent-bridle-core = { version = "0.1.0", path = "agent-bridle-core" }
agent-bridle-tool-shell = { version = "0.1.0", path = "agent-bridle-tool-shell" }
# `default-features = false` here so `agent-bridle-mcp` controls the facade's
# feature set (its own `shell`/`--no-default-features` forward through).
agent-bridle = { version = "0.1.0", path = "agent-bridle", default-features = false }

# The leash. One canonical authority type, shared across the whole agent line.
agent-mesh-protocol = "0.6"

# Core (lean) deps — these are the ONLY non-mesh deps allowed in core.
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
async-trait = "0.1"

# PyO3 — only the `agent-bridle-py` wheel turns this on (default-feature
# builds of the rest of the workspace never touch it). `extension-module` is
# enabled at the crate, not here, so any non-wheel consumer stays clean.
pyo3 = { version = "0.28", default-features = false, features = ["macros"] }

# Leaf-tool-only deps (never enter core or a host's default build).
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "time"] }
brush-core = "0.5"
brush-builtins = "0.2"
brush-coreutils-builtins = "0.1"

[profile.release]
# strip + thin-LTO is the verified real-world trigger for linker DCE silently
# dropping a self-registered (`inventory`) tool from `tools/list` (DESIGN §5).
# We exercise that hazard deliberately, but because P0 uses EXPLICIT
# `Registry::builder()` registration (anchored by facade `pub use`), it is safe.
strip = true
lto = "thin"
