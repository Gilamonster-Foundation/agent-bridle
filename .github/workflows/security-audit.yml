name: security-audit

# Privacy + secret-leak guardrails. This MUST stay green: it is the gate that
# keeps secrets and internal/operational specifics out of this public repository.
#
# HOOK PARITY: the secret-scan + internal-specifics checks here are mirrored
# locally by .pre-commit-config.yaml (gitleaks hook + scripts/check-internal-specifics.sh).
# When editing this file, update the pre-commit config to match.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    name: gitleaks secret scan
    runs-on: ${{ vars.GMF_LINUX_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # Run the open-source gitleaks binary directly. The gitleaks-action wrapper
      # requires a paid GITLEAKS_LICENSE for ORGANIZATION repos; the binary does not.
      - name: Install gitleaks
        run: |
          VER=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks
        run: gitleaks dir . --config .gitleaks.toml --redact --no-banner --verbose

  internal-specifics:
    name: internal-specifics linter
    runs-on: ${{ vars.GMF_LINUX_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v5
      - name: Run internal-specifics linter
        run: bash scripts/check-internal-specifics.sh

  docs-accuracy:
    name: docs-accuracy guard (no stale brush-runtime claims)
    runs-on: ${{ vars.GMF_LINUX_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v5
      - name: Run docs-accuracy guard
        run: bash scripts/check-docs-accuracy.sh
