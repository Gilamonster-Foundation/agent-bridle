# agent-bridle release — publish the brush-free crates to crates.io.
#
# This is a PUBLISH pipeline, not the test pipeline. Hook parity does NOT apply
# here: .githooks/pre-push mirrors .github/workflows/ci.yml (fmt + clippy +
# test), which this workflow re-runs as a gate before publishing. A pre-push
# hook does not publish, so there is nothing for it to mirror in this file.
#
# WHY ONLY SOME CRATES PUBLISH:
#   crates.io forbids ANY git source in a published crate's manifest — even an
#   optional one behind a feature. `agent-bridle-tool-shell` git-deps our brush
#   fork (the `CommandInterceptor` hook) and therefore CANNOT go to crates.io
#   until that hook lands upstream in reubeno/brush (2+ months between brush
#   releases) or we publish a renamed fork. Everything else is clean and ships
#   now. The confined shell remains consumable meanwhile via the MCP server,
#   the subprocess frontend, and the agent-bridle-py maturin wheel (git-deps are
#   fine for wheels). See docs/adr/0001-command-decomposition-and-ocap-layers.md
#   and docs/DESIGN.md.
#
# PUBLISHABLE NOW (dependency order matters — core before its dependents):
#   1. agent-bridle-core      (deps: agent-mesh-protocol "0.6" from crates.io)
#   2. agent-bridle-tool-web  (deps: agent-bridle-core)
# NOT YET (git-dep on brush fork):
#   - agent-bridle-tool-shell, and transitively the agent-bridle facade and
#     agent-bridle-mcp (both pull tool-shell with the `shell` feature on).

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run cargo publish --dry-run only (no upload)"
        type: boolean
        default: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  gate:
    name: fmt + clippy + test (pre-publish gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features

  publish-crates:
    name: Publish brush-free crates → crates.io
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      # cargo >= 1.66 blocks `cargo publish` until the new version is actually
      # downloadable from the registry index, so publishing core first and then
      # tool-web (which depends on it) is causally ordered — no wall-clock sleep
      # needed to "wait for the index" (and none wanted: time is not a
      # coordination primitive here).
      - name: Publish agent-bridle-core
        run: |
          cargo publish -p agent-bridle-core \
            ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }} \
            --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Publish agent-bridle-tool-web
        # On a dry run, tool-web cannot resolve an unpublished core from the
        # registry, so skip it when dry-running; the real run publishes both.
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        run: |
          cargo publish -p agent-bridle-tool-web \
            --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
