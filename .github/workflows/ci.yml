# agent-bridle CI.
#
# HOOK PARITY: This pipeline is mirrored by .githooks/pre-push and the `check` /
# `publish-check` / `py-test` recipes in justfile. When editing this file, update
# the push hook to match.
#
# The `check` job (ubuntu) is the primary matrix. The `check-macos` job
# (macos-latest, free for public repos) is the ONLY place the macOS-only
# `SeatbeltSandbox` is compiled and its kernel-enforcement proofs run (ADR 0006 /
# agent-bridle#50) — it cannot be built or tested from the Linux box. Likewise the
# `check-windows` job (windows-latest) is the ONLY place the Windows-only
# `AppContainerSandbox` + the `agent-bridle-aclaunch` launcher are compiled and the
# AppContainer unbridle honesty leg runs (ADR 0009 / agent-bridle#51; ADR 0018 R9).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Clippy (no default features)
        run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings

      - name: Test (all features)
        # BRIDLE_REQUIRE_LANDLOCK turns the Landlock kernel-enforcement proofs
        # from silent-skip into hard-FAIL when the kernel lacks Landlock, so CI
        # cannot go green without actually exercising the fs_write/fs_read
        # boundary (agent-bridle#74). ubuntu-latest ships a Landlock-capable
        # kernel; a local run without this flag legitimately skips.
        env:
          BRIDLE_REQUIRE_LANDLOCK: "1"
        run: cargo test --workspace --all-features

      - name: Test (no default features)
        run: cargo test --workspace --no-default-features

      # HOOK PARITY: mirrors `just publish-check` run by .githooks/pre-push.
      # Guards the out-of-tree dependency boundary (ADR 0008): fails if
      # agent-bridle-core stops being publishable (a git dep, a path-only
      # required dep), which would strand external consumers like newt-agent.
      - name: Publishability gate (agent-bridle-core dry-run)
        run: cargo publish --dry-run --allow-dirty -p agent-bridle-core

  # Build the PyO3 wheel + run the Python (Pillar A) tests, so the leash
  # invariant is verified from the language it's published for (agent-bridle#71).
  # HOOK PARITY: mirrors `just py-test` run by .githooks/pre-push.
  py-test:
    name: python wheel + pytest (Pillar A)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build agent_bridle (maturin) into a venv + run pytest
        run: |
          python -m venv .venv-pytest
          . .venv-pytest/bin/activate
          python -m pip install --upgrade pip
          pip install "maturin>=1.7,<2.0" pytest
          ( cd agent-bridle-py && maturin develop )
          python -m pytest agent-bridle-py/tests/ -q

  check-macos:
    name: macOS — Seatbelt L3 backend (clippy + kernel proofs)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # `--all-features` turns on `macos-seatbelt` (and `linux-landlock`, which is
      # inert here — its dep is `cfg(target_os = "linux")`). This is the only job
      # that actually compiles the macOS `seatbelt_impl` module. `agent-bridle-py`
      # is excluded (its PyO3 arm64 wheel link is handled separately; see justfile).
      - name: Clippy (compiles the macOS-only SeatbeltSandbox)
        run: cargo clippy --workspace --exclude agent-bridle-py --all-targets --all-features -- -D warnings

      # BRIDLE_REQUIRE_SEATBELT turns the Seatbelt kernel-enforcement proofs from
      # silent-skip into hard-FAIL when `sandbox-exec` is unavailable, so CI cannot
      # go green without exercising the fs_write/fs_read boundary (mirrors
      # BRIDLE_REQUIRE_LANDLOCK on ubuntu; agent-bridle#74). macOS runners ship
      # `/usr/bin/sandbox-exec`.
      - name: Test (require the Seatbelt kernel proofs)
        env:
          BRIDLE_REQUIRE_SEATBELT: "1"
        run: cargo test --workspace --exclude agent-bridle-py --all-features

  check-windows:
    name: Windows — AppContainer L3 backend (clippy + unbridle honesty leg)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # `--all-features` turns on `windows-appcontainer` (and the inert Linux/macOS
      # backends). This is the ONLY job that compiles the Windows-only
      # `appcontainer_impl` module and the `agent-bridle-aclaunch` launcher —
      # `cfg(target_os = "windows")` code neither the Linux nor the macOS job builds.
      # `agent-bridle-py` is excluded (its PyO3 wheel link is handled separately).
      - name: Clippy (compiles the Windows-only AppContainerSandbox + launcher)
        run: cargo clippy --workspace --exclude agent-bridle-py --all-targets --all-features -- -D warnings

      # The AppContainer backend's pure honesty proofs (report / sandbox / spawn):
      # exec-deny-all → Kernel (#123), net deny-all/loopback → Kernel (#133), fs
      # ACL narrowing (#51), and the `best_available_sandbox` → AppContainer select.
      - name: Test the AppContainer backend (core proofs)
        run: cargo test -p agent-bridle-core --features windows-appcontainer

      # The launcher's own unit tests: MSVC CommandLineToArgvW quoting (arg-injection
      # surface) and the flag parser. Windows-only crate — only this job builds it.
      - name: Test the agent-bridle-aclaunch launcher (unit)
        run: cargo test -p agent-bridle-aclaunch --bins

      # REAL AppContainer kernel-enforcement proofs (#51 / #123): spawn confined
      # children through the built launcher and assert the KERNEL blocks out-of-scope
      # fs writes/reads and (via --no-child-process) child-process creation.
      # BRIDLE_REQUIRE_APPCONTAINER turns "cannot create an AppContainer here" from a
      # silent skip into a hard FAIL, so CI cannot go green without exercising the
      # real boundary — the Windows analog of BRIDLE_REQUIRE_LANDLOCK/SEATBELT (#74).
      - name: AppContainer kernel-enforcement proofs (require the boundary)
        env:
          BRIDLE_REQUIRE_APPCONTAINER: "1"
        run: cargo test -p agent-bridle-aclaunch --test kernel_proofs -- --test-threads=1

      # Net-axis proofs (#133): deny-all kernel-blocks loopback egress, and (on this
      # elevated runner) --loopback-exemption permits it. BRIDLE_REQUIRE_APPCONTAINER
      # makes the elevated loopback-exemption case a hard requirement here.
      - name: AppContainer net-axis kernel proofs (require the boundary)
        env:
          BRIDLE_REQUIRE_APPCONTAINER: "1"
        run: cargo test -p agent-bridle-aclaunch --test net_proofs -- --test-threads=1

      # The ADR 0018 R9 per-OS honesty leg on the REAL AppContainer backend: an
      # unbridled run reports `sandbox_kind = none` with no axis claiming `kernel`,
      # even though a bridled AppContainer would kernel-confine every axis here.
      # Scoped to the `unbridle` test binary — the shell/web integration suites
      # assume a Unix host (POSIX paths, the `echo` binary) and run on the other jobs.
      - name: Unbridle honesty leg on AppContainer (ADR 0018 R9)
        run: cargo test -p agent-bridle-tool-shell --features windows-appcontainer --test unbridle
