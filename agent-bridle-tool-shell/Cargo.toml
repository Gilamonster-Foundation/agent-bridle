[package]
name = "agent-bridle-tool-shell"
# STUB RELEASE — full brush-backed shell is temporarily disabled pending
# reubeno/brush#1184 (CommandInterceptor upstream PR). The tool registers in
# the registry and documents its interface, but invoke() returns a clear error.
# See https://github.com/Gilamonster-Foundation/agent-bridle/issues/20
description = "Capability-confined shell tool for agent-bridle (stub — pending reubeno/brush#1184)."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[features]
# `shell` is on by default so agent-bridle's registry() includes the tool
# (as a stub). The tool is listed, its schema is advertised, and invoke()
# returns a clear explanation instead of silently absent.
default = ["shell"]
shell = ["dep:tokio"]
# linux-landlock forwarded for API compatibility — no-op in the stub.
linux-landlock = ["agent-bridle-core/linux-landlock"]

[dependencies]
agent-bridle-core = { workspace = true }
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
tokio = { workspace = true, optional = true }

# brush deps — REMOVED pending reubeno/brush#1184.
# Restore by re-adding to workspace Cargo.toml and uncommenting in the shell
# feature above. See https://github.com/Gilamonster-Foundation/agent-bridle/issues/20
# brush-core              = { workspace = true, optional = true }
# brush-builtins          = { workspace = true, optional = true }
# brush-coreutils-builtins = { workspace = true, optional = true }

[dev-dependencies]
tokio = { workspace = true }
serde_json = { workspace = true }
